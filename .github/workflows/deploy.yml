name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: opsagent-prod
  REGION: me-west1
  PROXY_SERVICE: opsagents-studio-console-proxy
  AR_REPO: opsagents-studio-console
  WIF_PROVIDER: projects/523955774086/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  DEPLOY_SA: gha-deployer@opsagent-prod.iam.gserviceaccount.com
  # Firebase Web config is public-by-design — safe to commit. Security is enforced via Firestore rules + Auth provider config.
  VITE_FIREBASE_API_KEY: AIzaSyDgHI69rZPf4q4IIOZkmjL4mgtl0iBRGHQ
  VITE_FIREBASE_AUTH_DOMAIN: opsagent-prod.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: opsagent-prod
  VITE_FIREBASE_APP_ID: 1:523955774086:web:08128dd54f8328d427e707
  # The project-number form (proxy-523955774086.me-west1.run.app) does NOT resolve
  # for newly-created services — Cloud Run only mints the random-hash form now.
  # Verified via `gcloud run services describe`.
  VITE_PROXY_URL: https://opsagents-studio-console-proxy-zadkrinzra-zf.a.run.app

jobs:
  build-deploy-app:
    name: Build + deploy SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - name: Install
        working-directory: app
        run: npm install
      - name: Build
        working-directory: app
        env:
          VITE_FIREBASE_API_KEY: ${{ env.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ env.VITE_FIREBASE_APP_ID }}
          VITE_PROXY_URL: ${{ env.VITE_PROXY_URL }}
        run: npm run build
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Firebase Hosting via REST API
        # firebase-tools' bundled google-auth-library doesn't parse external_account
        # (WIF) credentials JSON correctly — passes the file path through where
        # the content is expected, then JSON.parse barfs on "/home/runner/...".
        # Bypassed by talking to the Firebase Hosting REST API directly with an
        # access token from gcloud (which DOES handle external_account).
        env:
          SITE: opsagents-studio-console
        run: |
          set -euo pipefail
          TOKEN=$(gcloud auth print-access-token)
          API=https://firebasehosting.googleapis.com/v1beta1

          # 1. Create version
          VERSION=$(curl -sS -X POST -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            "$API/sites/$SITE/versions" -d '{}' | python3 -c 'import sys,json;print(json.load(sys.stdin)["name"])')
          echo "Created version: $VERSION"

          # 2. Hash + gzip every file in app/dist, build the file map
          cd app/dist
          declare -A HASH_TO_FILE
          FILE_MAP='{}'
          while IFS= read -r -d '' f; do
            rel="/${f#./}"
            gz_path="/tmp/upload$rel.gz"
            mkdir -p "$(dirname "$gz_path")"
            gzip -9 -n -c "$f" > "$gz_path"
            sha=$(sha256sum "$gz_path" | cut -d' ' -f1)
            HASH_TO_FILE[$sha]="$gz_path"
            FILE_MAP=$(python3 -c "import json,sys; m=json.loads(sys.argv[1]); m[sys.argv[2]]=sys.argv[3]; print(json.dumps(m))" "$FILE_MAP" "$rel" "$sha")
          done < <(find . -type f -print0)
          echo "File map: $FILE_MAP"

          # 3. populateFiles → tells us which hashes to actually upload + the uploadUrl
          POPULATE=$(curl -sS -X POST -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            "$API/$VERSION:populateFiles" -d "{\"files\": $FILE_MAP}")
          echo "Populate response: $POPULATE"
          UPLOAD_URL=$(echo "$POPULATE" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("uploadUrl",""))')
          UPLOADS=$(echo "$POPULATE" | python3 -c 'import sys,json;d=json.load(sys.stdin);print("\n".join(d.get("uploadRequiredHashes",[])))')

          # 4. Upload required gzipped files keyed by hash
          for sha in $UPLOADS; do
            f=${HASH_TO_FILE[$sha]}
            echo "Uploading $sha ($f)..."
            curl -sS -X POST -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/octet-stream' \
              --data-binary "@$f" "$UPLOAD_URL/$sha" -o /dev/null -w "  -> HTTP %{http_code}\n"
          done

          # 5. Finalize version
          curl -sS -X PATCH -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            "$API/$VERSION?updateMask=status" -d '{"status":"FINALIZED"}' | head -c 500; echo

          # 6. Release
          RELEASE=$(curl -sS -X POST -H "Authorization: Bearer $TOKEN" \
            "$API/sites/$SITE/releases?versionName=$VERSION")
          echo "Release: $RELEASE"
          echo "✅ Live at https://$SITE.web.app"

  build-deploy-proxy:
    name: Build + deploy Cloud Run proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build + push image
        working-directory: proxy
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/proxy:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.PROXY_SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --allow-unauthenticated \
            --service-account=studio-console-proxy@opsagent-prod.iam.gserviceaccount.com \
            --update-secrets=BRIDGE_API_KEY=OPSAGENT_AI_RUNTIME_API_KEY:latest \
            --update-env-vars="^|^BRIDGE_URL=https://opsagent-core-523955774086.me-west1.run.app/api/generate-image|ALLOWED_ORIGINS=https://opsagents-studio-console.web.app,https://console.studio.opsagents.agency|FIRESTORE_DB=studio-console" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=60s
